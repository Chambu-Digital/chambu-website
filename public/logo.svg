<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="shieldL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2b1a"/>
      <stop offset="100%" stop-color="#1a4a30"/>
    </linearGradient>
    <linearGradient id="shieldR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00a85a"/>
      <stop offset="100%" stop-color="#00c96a"/>
    </linearGradient>
    <clipPath id="shieldClip">
      <path d="M50 6 L88 20 L88 52 C88 72 70 88 50 94 C30 88 12 72 12 52 L12 20 Z"/>
    </clipPath>
  </defs>

  <!-- Shield left half (dark green) -->
  <path d="M50 6 L88 20 L88 52 C88 72 70 88 50 94 C30 88 12 72 12 52 L12 20 Z" fill="url(#shieldL)"/>

  <!-- Shield right half (bright green) -->
  <rect x="50" y="0" width="50" height="100" fill="url(#shieldR)" clip-path="url(#shieldClip)"/>

  <!-- Subtle shield border -->
  <path d="M50 6 L88 20 L88 52 C88 72 70 88 50 94 C30 88 12 72 12 52 L12 20 Z"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Center divider line -->
  <line x1="50" y1="6" x2="50" y2="94" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Gear ring (white) -->
  <circle cx="50" cy="46" r="18" fill="white"/>

  <!-- Gear teeth -->
  <g fill="white">
    <rect x="47" y="24" width="6" height="7" rx="1.5"/>
    <rect x="47" y="61" width="6" height="7" rx="1.5"/>
    <rect x="24" y="43" width="7" height="6" rx="1.5"/>
    <rect x="61" y="43" width="7" height="6" rx="1.5"/>
    <!-- diagonal teeth -->
    <rect x="31.5" y="29.5" width="6" height="7" rx="1.5" transform="rotate(45 34.5 33)"/>
    <rect x="56.5" y="54.5" width="6" height="7" rx="1.5" transform="rotate(45 59.5 58)"/>
    <rect x="56.5" y="29.5" width="6" height="7" rx="1.5" transform="rotate(-45 59.5 33)"/>
    <rect x="31.5" y="54.5" width="6" height="7" rx="1.5" transform="rotate(-45 34.5 58)"/>
  </g>

  <!-- Inner gear hole (dark) -->
  <circle cx="50" cy="46" r="10" fill="#0d2b1a"/>

  <!-- Inner dot accent -->
  <circle cx="50" cy="46" r="4" fill="#00a85a"/>
</svg>
